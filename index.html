<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>镜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', 'SimSun', 'FangSong', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        #cover-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .pixel-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .cover-title {
            font-size: 64px;
            color: #e8d5b7;
            letter-spacing: 12px;
            text-shadow:
                0 0 10px rgba(232, 213, 183, 0.6),
                0 0 30px rgba(232, 213, 183, 0.3),
                2px 2px 0 #3a2a1a;
            margin-bottom: 60px;
            z-index: 1;
        }

        .btn-start {
            padding: 16px 48px;
            font-size: 20px;
            font-family: 'Courier New', 'SimSun', monospace;
            color: #e8d5b7;
            background: transparent;
            border: 3px solid #6b5a4a;
            cursor: pointer;
            letter-spacing: 6px;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
            text-shadow: 0 0 8px rgba(232, 213, 183, 0.5);
            margin-bottom: 20px;
        }

        .btn-start:hover {
            background: rgba(232, 213, 183, 0.1);
            border-color: #e8d5b7;
            box-shadow: 0 0 20px rgba(232, 213, 183, 0.2);
        }

        .btn-start:active {
            transform: scale(0.95);
        }

        .btn-music {
            padding: 10px 20px;
            font-size: 14px;
            font-family: 'Courier New', 'SimSun', monospace;
            color: #8a7a6a;
            background: transparent;
            border: 2px solid #4a3a2a;
            cursor: pointer;
            letter-spacing: 3px;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .btn-music:hover {
            color: #e8d5b7;
            border-color: #6b5a4a;
        }

        .btn-music.muted {
            color: #5a4a3a;
            border-color: #3a2a1a;
            text-decoration: line-through;
        }

        #create-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            z-index: 10;
            padding-top: 80px;
        }

        #create-screen.active {
            display: flex;
        }

        .eye-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .create-panel {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 32px 28px;
            border: 2px solid #5a2020;
            background: rgba(0, 0, 0, 0.75);
            border-radius: 4px;
        }

        .create-title {
            font-size: 28px;
            color: #c48b6b;
            letter-spacing: 6px;
            text-shadow: 0 0 8px rgba(180, 80, 60, 0.5);
        }

        .input-name {
            width: 220px;
            padding: 10px 14px;
            font-size: 16px;
            font-family: 'Courier New', 'SimSun', monospace;
            color: #e8d5b7;
            background: #0a0a0a;
            border: 2px solid #5a2020;
            outline: none;
            text-align: center;
            letter-spacing: 3px;
        }

        .input-name::placeholder {
            color: #4a3030;
            letter-spacing: 2px;
        }

        .input-name:focus {
            border-color: #a04040;
            box-shadow: 0 0 12px rgba(160, 60, 60, 0.3);
        }

        .upload-label {
            padding: 10px 24px;
            font-size: 14px;
            font-family: 'Courier New', 'SimSun', monospace;
            color: #c48b6b;
            border: 2px dashed #5a2020;
            cursor: pointer;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .upload-label:hover {
            border-color: #a04040;
            color: #d4a090;
        }

        #file-input {
            display: none;
        }

        .preview-container {
            width: 80px;
            height: 80px;
            border: 2px solid #5a2020;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #0a0a0a;
        }

        .preview-container img {
            max-width: 100%;
            max-height: 100%;
            image-rendering: pixelated;
        }

        .preview-placeholder {
            color: #3a2020;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .btn-confirm {
            padding: 12px 40px;
            font-size: 16px;
            font-family: 'Courier New', 'SimSun', monospace;
            color: #c48b6b;
            background: transparent;
            border: 2px solid #5a2020;
            cursor: pointer;
            letter-spacing: 4px;
            transition: all 0.3s ease;
        }

        .btn-confirm:hover {
            border-color: #a04040;
            color: #d4a090;
            box-shadow: 0 0 12px rgba(160, 60, 60, 0.3);
        }

        .btn-confirm:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .file-name {
            color: #6b3a2a;
            font-size: 11px;
            letter-spacing: 1px;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        
        <div id="cover-screen">
            <canvas class="pixel-particles" id="particles-canvas"></canvas>
            <h1 class="cover-title">镜</h1>
            <button class="btn-start" id="btn-start">开 始 游 戏</button>
            <button class="btn-music" id="btn-music">🔇 点击开启音乐</button>
        </div>

        <div id="create-screen">
            <canvas class="eye-canvas" id="eye-canvas"></canvas>
            <div class="create-panel">
                <h2 class="create-title">创 建 角 色</h2>
                <input type="text" class="input-name" id="input-name" placeholder="输入你的名字" maxlength="8">
                <label class="upload-label" for="file-input">📁 上传形象 (PNG)</label>
                <input type="file" id="file-input" accept="image/png">
                <div class="preview-container" id="preview-container">
                    <span class="preview-placeholder">预览</span>
                </div>
                <span class="file-name" id="file-name"></span>
                <button class="btn-confirm" id="btn-confirm" disabled>确 认</button>
            </div>
        </div>

    </div>

    <audio id="bgm" loop preload="auto">
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>

    <script>
        const bgm = document.getElementById('bgm');
        const btnMusic = document.getElementById('btn-music');
        let musicStarted = false;

        btnMusic.addEventListener('click', () => {
            if (!musicStarted) {
                bgm.play().then(() => {
                    musicStarted = true;
                    btnMusic.textContent = '♪ 音乐：开';
                    btnMusic.classList.remove('muted');
                }).catch(err => {
                    console.log('播放失败:', err);
                });
            } else {
                if (bgm.paused) {
                    bgm.play();
                    btnMusic.textContent = '♪ 音乐：开';
                    btnMusic.classList.remove('muted');
                } else {
                    bgm.pause();
                    btnMusic.textContent = '🔇 音乐：关';
                    btnMusic.classList.add('muted');
                }
            }
        });

        document.addEventListener('click', function tryPlayMusic() {
            if (!musicStarted) {
                bgm.play().then(() => {
                    musicStarted = true;
                    btnMusic.textContent = '♪ 音乐：开';
                    btnMusic.classList.remove('muted');
                }).catch(() => {});
            }
        }, { once: false });

        const particlesCanvas = document.getElementById('particles-canvas');
        const particlesCtx = particlesCanvas.getContext('2d');
        const container = document.getElementById('game-container');

        let particles = [];
        const PARTICLE_COUNT = 80;

        function resizeParticlesCanvas() {
            particlesCanvas.width = container.clientWidth;
            particlesCanvas.height = container.clientHeight;
        }

        class PixelParticle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * particlesCanvas.width;
                this.y = particlesCanvas.height + Math.random() * 40;
                this.size = Math.random() < 0.7 ? 2 : 3;
                this.speed = 0.3 + Math.random() * 0.8;
                this.opacity = 0.3 + Math.random() * 0.7;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = (Math.random() - 0.5) * 0.02;
                this.lifespan = 300 + Math.random() * 400;
                this.age = 0;
            }
            update() {
                this.age++;
                this.y -= this.speed;
                this.x += Math.sin(this.wobble) * 0.3;
                this.wobble += this.wobbleSpeed;
                const lifeRatio = this.age / this.lifespan;
                if (lifeRatio < 0.2) {
                    this.currentOpacity = this.opacity * (lifeRatio / 0.2);
                } else if (lifeRatio > 0.8) {
                    this.currentOpacity = this.opacity * ((1 - lifeRatio) / 0.2);
                } else {
                    this.currentOpacity = this.opacity;
                }
                if (this.age >= this.lifespan || this.y < -10) {
                    this.reset();
                }
            }
            draw(ctx) {
                ctx.fillStyle = `rgba(220, 210, 190, ${this.currentOpacity})`;
                ctx.fillRect(Math.floor(this.x), Math.floor(this.y), this.size, this.size);
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const p = new PixelParticle();
                p.y = Math.random() * particlesCanvas.height;
                p.age = Math.floor(Math.random() * p.lifespan);
                particles.push(p);
            }
        }

        function animateParticles() {
            particlesCtx.clearRect(0, 0, particlesCanvas.width, particlesCanvas.height);
            particles.forEach(p => {
                p.update();
                p.draw(particlesCtx);
            });
            requestAnimationFrame(animateParticles);
        }

        resizeParticlesCanvas();
        initParticles();
        animateParticles();

        window.addEventListener('resize', () => {
            resizeParticlesCanvas();
        });

        // ========== 眨眼眼睛背景 ==========
        const eyeCanvas = document.getElementById('eye-canvas');
        const eyeCtx = eyeCanvas.getContext('2d');

        function resizeEyeCanvas() {
            eyeCanvas.width = container.clientWidth;
            eyeCanvas.height = container.clientHeight;
        }

        class FloatingEye {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = 20 + Math.random() * (eyeCanvas.width - 40);
                this.y = 30 + Math.random() * (eyeCanvas.height * 0.8);
                // 眼睛大小
                this.size = 16 + Math.random() * 40;
                // 眨眼周期
                this.blinkInterval = 120 + Math.random() * 200; // 帧
                this.blinkTimer = Math.floor(Math.random() * this.blinkInterval);
                this.isBlinking = false;
                this.blinkProgress = 0; // 0=睁开, 1=闭眼
                this.blinkSpeed = 0.06 + Math.random() * 0.1;
                // 眼球微微飘动
                this.floatPhase = Math.random() * Math.PI * 2;
                this.floatSpeed = 0.005 + Math.random() * 0.015;
                this.floatRange = 3 + Math.random() * 8;
                this.originX = this.x;
                this.originY = this.y;
                // 瞳孔方向（微微偏移）
                this.pupilOffsetX = (Math.random() - 0.5) * this.size * 0.2;
                this.pupilOffsetY = (Math.random() - 0.5) * this.size * 0.2;
                // 颜色
                const glow = 120 + Math.floor(Math.random() * 80);
                this.irisColor = `rgba(${glow - 40}, ${glow - 80}, ${glow - 60}, 0.85)`;
                this.pupilColor = '#0a0000';
                this.scleraColor = 'rgba(200, 180, 170, 0.6)';
            }

            update() {
                // 漂浮
                this.floatPhase += this.floatSpeed;
                this.x = this.originX + Math.sin(this.floatPhase) * this.floatRange;
                this.y = this.originY + Math.cos(this.floatPhase * 1.3) * this.floatRange * 0.6;

                // 眨眼逻辑
                this.blinkTimer++;
                if (this.blinkTimer >= this.blinkInterval) {
                    this.isBlinking = true;
                    this.blinkTimer = 0;
                    this.blinkInterval = 100 + Math.random() * 250;
                }

                if (this.isBlinking) {
                    this.blinkProgress += this.blinkSpeed;
                    if (this.blinkProgress >= 1) {
                        this.blinkProgress = 1;
                        // 开始睁眼
                        this.isBlinking = false;
                    }
                } else {
                    if (this.blinkProgress > 0) {
                        this.blinkProgress -= this.blinkSpeed;
                        if (this.blinkProgress < 0) this.blinkProgress = 0;
                    }
                }

                // 偶尔换瞳孔方向
                if (Math.random() < 0.003) {
                    this.pupilOffsetX = (Math.random() - 0.5) * this.size * 0.3;
                    this.pupilOffsetY = (Math.random() - 0.5) * this.size * 0.3;
                }
            }

            draw(ctx) {
                const cx = Math.floor(this.x);
                const cy = Math.floor(this.y);
                const s = Math.floor(this.size);
                const halfS = Math.floor(s / 2);
                const blinkRatio = this.blinkProgress;

                // 眼白（椭圆）
                const eyeHeight = Math.floor(halfS * 1.3 * (1 - blinkRatio));
                const eyeWidth = Math.floor(halfS * 1.4);

                if (eyeHeight <= 0) return;

                // 用像素块画眼白
                for (let dy = -eyeHeight; dy <= eyeHeight; dy += 2) {
                    const ratio = Math.abs(dy) / eyeHeight;
                    const rowWidth = Math.floor(eyeWidth * Math.sqrt(Math.max(0, 1 - ratio * ratio)));
                    for (let dx = -rowWidth; dx <= rowWidth; dx += 2) {
                        const px = cx + dx;
                        const py = cy + dy;
                        // 边缘稍暗
                        const edgeDist = Math.abs(dx) / (rowWidth || 1);
                        const alpha = 0.35 + 0.25 * (1 - edgeDist);
                        ctx.fillStyle = `rgba(190, 170, 155, ${alpha})`;
                        ctx.fillRect(px, py, 2, 2);
                    }
                }

                // 虹膜
                const irisR = Math.floor(halfS * 0.55);
                const irisHeight = Math.floor(irisR * (1 - blinkRatio));
                if (irisHeight > 0) {
                    for (let dy = -irisHeight; dy <= irisHeight; dy += 2) {
                        const ratio = Math.abs(dy) / irisHeight;
                        const rowWidth = Math.floor(irisR * Math.sqrt(Math.max(0, 1 - ratio * ratio)));
                        for (let dx = -rowWidth; dx <= rowWidth; dx += 2) {
                            ctx.fillStyle = this.irisColor;
                            ctx.fillRect(cx + dx, cy + dy, 2, 2);
                        }
                    }

                    // 瞳孔
                    const pupilR = Math.floor(irisR * 0.45);
                    const px = Math.floor(cx + this.pupilOffsetX * (1 - blinkRatio));
                    const py = Math.floor(cy + this.pupilOffsetY * (1 - blinkRatio));
                    const pupilHeight = Math.floor(pupilR * (1 - blinkRatio));
                    if (pupilHeight > 0) {
                        for (let dy = -pupilHeight; dy <= pupilHeight; dy += 2) {
                            const ratio = Math.abs(dy) / pupilHeight;
                            const rowWidth = Math.floor(pupilR * Math.sqrt(Math.max(0, 1 - ratio * ratio)));
                            for (let dx = -rowWidth; dx <= rowWidth; dx += 2) {
                                ctx.fillStyle = this.pupilColor;
                                ctx.fillRect(px + dx, py + dy, 2, 2);
                            }
                        }
                    }

                    // 高光
                    const highlightR = Math.floor(pupilR * 0.4);
                    const hx = cx - Math.floor(irisR * 0.25);
                    const hy = cy - Math.floor(irisR * 0.2);
                    const hlHeight = Math.floor(highlightR * (1 - blinkRatio));
                    if (hlHeight > 0) {
                        for (let dy = -hlHeight; dy <= hlHeight; dy += 2) {
                            const ratio = Math.abs(dy) / hlHeight;
                            const rowWidth = Math.floor(highlightR * Math.sqrt(Math.max(0, 1 - ratio * ratio)));
                            for (let dx = -rowWidth; dx <= rowWidth; dx += 2) {
                                if (Math.random() > 0.4) {
                                    ctx.fillStyle = 'rgba(255, 240, 230, 0.7)';
                                    ctx.fillRect(hx + dx, hy + dy, 2, 2);
                                }
                            }
                        }
                    }
                }

                // 上下眼睑线（像素边框）
                if (blinkRatio < 0.9) {
                    ctx.strokeStyle = 'rgba(100, 50, 40, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.ellipse(cx, cy, eyeWidth, eyeHeight, 0, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
        }

        let eyes = [];
        const EYE_COUNT = 8;

        function initEyes() {
            eyes = [];
            for (let i = 0; i < EYE_COUNT; i++) {
                eyes.push(new FloatingEye());
            }
        }

        function animateEyes() {
            eyeCtx.clearRect(0, 0, eyeCanvas.width, eyeCanvas.height);
            eyes.forEach(eye => {
                eye.update();
                eye.draw(eyeCtx);
            });
            requestAnimationFrame(animateEyes);
        }

        resizeEyeCanvas();
        initEyes();
        animateEyes();

        window.addEventListener('resize', () => {
            resizeEyeCanvas();
        });

        // ========== 界面切换 ==========
        const coverScreen = document.getElementById('cover-screen');
        const createScreen = document.getElementById('create-screen');
        const inputName = document.getElementById('input-name');
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const fileNameDisplay = document.getElementById('file-name');
        const btnConfirm = document.getElementById('btn-confirm');

        let playerName = '';
        let playerImage = null;

        document.getElementById('btn-start').addEventListener('click', () => {
            coverScreen.style.display = 'none';
            createScreen.classList.add('active');
            resizeEyeCanvas();
        });

        inputName.addEventListener('input', () => {
            playerName = inputName.value.trim();
            checkConfirmReady();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && file.type === 'image/png') {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    playerImage = ev.target.result;
                    previewContainer.innerHTML = `<img src="${playerImage}" alt="形象预览">`;
                    fileNameDisplay.textContent = file.name;
                    checkConfirmReady();
                };
                reader.readAsDataURL(file);
            } else {
                previewContainer.innerHTML = '<span class="preview-placeholder">预览</span>';
                fileNameDisplay.textContent = '';
                playerImage = null;
                checkConfirmReady();
            }
        });

        function checkConfirmReady() {
            if (playerName.length > 0 && playerImage) {
                btnConfirm.disabled = false;
            } else {
                btnConfirm.disabled = true;
            }
        }

        btnConfirm.addEventListener('click', () => {
            if (!playerName || !playerImage) return;
            console.log('玩家名字:', playerName);
            console.log('形象数据已就绪');
            createScreen.classList.remove('active');
        });
    </script>
</body>
</html>
