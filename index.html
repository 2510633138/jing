<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>镜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', 'SimSun', 'FangSong', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        #cover-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .pixel-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .cover-title {
            font-size: 64px;
            color: #e8d5b7;
            letter-spacing: 12px;
            text-shadow:
                0 0 10px rgba(232, 213, 183, 0.6),
                0 0 30px rgba(232, 213, 183, 0.3),
                2px 2px 0 #3a2a1a;
            margin-bottom: 60px;
            z-index: 1;
        }

        .btn-start {
            padding: 16px 48px;
            font-size: 20px;
            font-family: 'Courier New', 'SimSun', monospace;
            color: #e8d5b7;
            background: transparent;
            border: 3px solid #6b5a4a;
            cursor: pointer;
            letter-spacing: 6px;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
            text-shadow: 0 0 8px rgba(232, 213, 183, 0.5);
            margin-bottom: 20px;
        }

        .btn-start:hover {
            background: rgba(232, 213, 183, 0.1);
            border-color: #e8d5b7;
            box-shadow: 0 0 20px rgba(232, 213, 183, 0.2);
        }

        .btn-start:active {
            transform: scale(0.95);
        }

        .btn-music {
            padding: 10px 20px;
            font-size: 14px;
            font-family: 'Courier New', 'SimSun', monospace;
            color: #8a7a6a;
            background: transparent;
            border: 2px solid #4a3a2a;
            cursor: pointer;
            letter-spacing: 3px;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .btn-music:hover {
            color: #e8d5b7;
            border-color: #6b5a4a;
        }

        .btn-music.muted {
            color: #5a4a3a;
            border-color: #3a2a1a;
            text-decoration: line-through;
        }
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        
        <div id="cover-screen">
            <canvas class="pixel-particles" id="particles-canvas"></canvas>
            <h1 class="cover-title">镜</h1>
            <button class="btn-start" id="btn-start">开 始 游 戏</button>
            <button class="btn-music" id="btn-music">🔇 点击开启音乐</button>
        </div>

    </div>

    <audio id="bgm" loop preload="auto">
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ========== 背景音乐控制 ==========
        const bgm = document.getElementById('bgm');
        const btnMusic = document.getElementById('btn-music');
        let musicStarted = false;

        btnMusic.addEventListener('click', () => {
            if (!musicStarted) {
                bgm.play().then(() => {
                    musicStarted = true;
                    btnMusic.textContent = '♪ 音乐：开';
                    btnMusic.classList.remove('muted');
                }).catch(err => {
                    console.log('播放失败:', err);
                });
            } else {
                if (bgm.paused) {
                    bgm.play();
                    btnMusic.textContent = '♪ 音乐：开';
                    btnMusic.classList.remove('muted');
                } else {
                    bgm.pause();
                    btnMusic.textContent = '🔇 音乐：关';
                    btnMusic.classList.add('muted');
                }
            }
        });

        document.addEventListener('click', function tryPlayMusic() {
            if (!musicStarted) {
                bgm.play().then(() => {
                    musicStarted = true;
                    btnMusic.textContent = '♪ 音乐：开';
                    btnMusic.classList.remove('muted');
                }).catch(() => {});
            }
        }, { once: false });

        // ========== 像素蒸腾粒子 ==========
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');

        let particles = [];
        const PARTICLE_COUNT = 80;

        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }

        class PixelParticle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 40;
                this.size = Math.random() < 0.7 ? 2 : 3;
                this.speed = 0.3 + Math.random() * 0.8;
                this.opacity = 0.3 + Math.random() * 0.7;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = (Math.random() - 0.5) * 0.02;
                this.lifespan = 300 + Math.random() * 400;
                this.age = 0;
            }

            update() {
                this.age++;
                this.y -= this.speed;
                this.x += Math.sin(this.wobble) * 0.3;
                this.wobble += this.wobbleSpeed;

                const lifeRatio = this.age / this.lifespan;
                if (lifeRatio < 0.2) {
                    this.currentOpacity = this.opacity * (lifeRatio / 0.2);
                } else if (lifeRatio > 0.8) {
                    this.currentOpacity = this.opacity * ((1 - lifeRatio) / 0.2);
                } else {
                    this.currentOpacity = this.opacity;
                }

                if (this.age >= this.lifespan || this.y < -10) {
                    this.reset();
                }
            }

            draw(ctx) {
                ctx.fillStyle = `rgba(220, 210, 190, ${this.currentOpacity})`;
                ctx.fillRect(
                    Math.floor(this.x),
                    Math.floor(this.y),
                    this.size,
                    this.size
                );
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const p = new PixelParticle();
                p.y = Math.random() * canvas.height;
                p.age = Math.floor(Math.random() * p.lifespan);
                particles.push(p);
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw(ctx);
            });
            requestAnimationFrame(animateParticles);
        }

        resizeCanvas();
        initParticles();
        animateParticles();

        window.addEventListener('resize', () => {
            resizeCanvas();
        });

        // ========== 点击开始游戏 ==========
        document.getElementById('btn-start').addEventListener('click', () => {
            document.getElementById('cover-screen').style.display = 'none';
            console.log('进入创建角色阶段');
        });
    </script>
</body>
</html>
